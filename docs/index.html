<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Markdown editor</title>
    <!-- Toast editor style -->
    <link
      rel="stylesheet"
      href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css"
    />
  </head>
  <body>
    <h1>Workskin editor</h1>
    <div id="exports"><button id="export">Export HTML</button></div>
    <div id="editor"></div>

    <!-- Page setup -->
    <script src="./marked.js" type="module"></script>
    <script src="./toast.js" type="module"></script>
    <script>
      function setupExport() {
        const button = document.getElementById("export");
        button.addEventListener("click", () => {
          const html = editor.getHtml();
          // FIXME do something better with this
          console.log(html);
        });
      }

      // Setup the editor after the page finished loading
      setTimeout(() => {
        setupExport();
      }, 3_000);
    </script>
  </body>
</html>
